<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>برق · الشات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
  :root{
    --bg:#FFFFFF;
    --surface:#F5F5F5;
    --border:rgba(0,0,0,.12);
    --ink:#111111;
    --ink-dim:rgba(17,17,17,.4);
    --ink-soft:rgba(17,17,17,.6);
    --user-bg:#111111;
    --user-ink:#FFFFFF;
    --agent-bg:#F0F0F0;
    --ok:#1A7A50;
    --font:"IBM Plex Sans Arabic","Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);display:flex;flex-direction:column}

  /* ── Top bar ── */
  .topbar{
    display:flex;align-items:center;gap:12px;
    padding:14px 18px;border-bottom:1px solid var(--border);
    background:var(--bg);flex:none;
  }
  .barq-icon{
    width:36px;height:36px;border-radius:10px;background:#111;
    display:grid;place-items:center;flex:none;
  }
  .barq-icon svg{display:block}
  .topbar-text h1{font-size:16px;font-weight:700;line-height:1.2}
  .topbar-text p{font-size:12px;color:var(--ink-dim)}
  .status-dot{
    width:8px;height:8px;border-radius:50%;background:#ccc;
    margin-inline-start:auto;flex:none;transition:background .3s
  }
  .status-dot.connected{background:#3DD68C}

  /* ── Chat area ── */
  .chat-area{
    flex:1;overflow-y:auto;padding:16px 14px;
    display:flex;flex-direction:column;gap:10px;
  }
  .chat-area::-webkit-scrollbar{width:4px}
  .chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

  /* bubbles */
  .msg{display:flex;flex-direction:column;max-width:82%}
  .msg.user{align-self:flex-start;align-items:flex-start}
  .msg.agent{align-self:flex-end;align-items:flex-end}

  .bubble{
    padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.6;
    word-break:break-word;
  }
  .msg.user  .bubble{background:var(--user-bg);color:var(--user-ink);border-radius:18px 18px 18px 4px}
  .msg.agent .bubble{background:var(--agent-bg);color:var(--ink);border-radius:18px 18px 4px 18px}

  .msg-time{font-size:11px;color:var(--ink-dim);margin-top:3px;padding:0 4px}

  /* typing indicator */
  .typing .bubble{display:flex;gap:5px;align-items:center;padding:12px 16px}
  .typing .dot{width:7px;height:7px;border-radius:50%;background:var(--ink-dim);
    animation:bounce .9s ease-in-out infinite}
  .typing .dot:nth-child(2){animation-delay:.15s}
  .typing .dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

  /* offer card bubble */
  .offer-card{
    background:var(--bg);border:1px solid var(--border);border-radius:16px;
    padding:14px;display:flex;flex-direction:column;gap:10px;
    max-width:300px;align-self:flex-end;
  }
  .offer-card .oc-head{display:flex;align-items:center;gap:10px}
  .offer-card .oc-logo{
    width:40px;height:40px;border-radius:11px;display:grid;place-items:center;
    font-weight:700;font-size:16px;color:#fff;flex:none;
  }
  .offer-card .oc-name{font-size:15px;font-weight:600;line-height:1.3}
  .offer-card .oc-cat{font-size:12px;color:var(--ink-dim)}
  .offer-card .oc-deal{
    padding:10px 12px;border-radius:12px;
    background:var(--surface);border:1px solid var(--border);
  }
  .offer-card .oc-pct{font-size:28px;font-weight:700;letter-spacing:-1px}
  .offer-card .oc-lbl{font-size:13px;color:var(--ink-soft)}
  .offer-card .oc-meta{font-size:13px;color:var(--ink-soft);display:flex;flex-direction:column;gap:5px}
  .offer-card .oc-meta span{display:flex;align-items:center;gap:6px}

  /* similar offers */
  .similar-list{display:flex;flex-direction:column;gap:8px;max-width:300px;align-self:flex-end}
  .sim-item{
    display:flex;align-items:center;gap:10px;padding:10px 12px;
    border-radius:12px;background:var(--surface);border:1px solid var(--border);
  }
  .sim-logo{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;
    font-weight:700;color:#fff;font-size:13px;flex:none}
  .sim-info b{font-size:13px;font-weight:600;display:block}
  .sim-info span{font-size:12px;color:var(--ink-dim)}
  .sim-pct{font-size:14px;font-weight:700;margin-inline-start:auto}

  /* ── Input bar ── */
  .input-bar{
    display:flex;gap:8px;align-items:flex-end;
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    border-top:1px solid var(--border);background:var(--bg);flex:none;
  }
  .input-wrap{
    flex:1;display:flex;align-items:center;
    background:var(--surface);border:1.5px solid var(--border);
    border-radius:22px;padding:0 14px;min-height:44px;
    transition:border-color .2s;
  }
  .input-wrap:focus-within{border-color:#555}
  textarea#msgInput{
    flex:1;border:none;background:transparent;resize:none;
    font-family:var(--font);font-size:15px;color:var(--ink);
    outline:none;direction:rtl;line-height:1.5;
    max-height:100px;overflow-y:auto;padding:10px 0;
  }
  textarea#msgInput::placeholder{color:var(--ink-dim)}

  .send-btn{
    width:42px;height:42px;border-radius:50%;border:none;
    background:#111;color:#fff;cursor:pointer;
    display:grid;place-items:center;flex:none;
    transition:transform .15s,background .2s;
  }
  .send-btn:active{transform:scale(.91)}
  .send-btn:disabled{background:#ccc;cursor:default}

  /* reset button */
  .reset-btn{
    width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
    background:transparent;cursor:pointer;display:grid;place-items:center;
    color:var(--ink-dim);flex:none;transition:color .2s;
  }
  .reset-btn:hover{color:var(--ink)}

  /* markdown inside agent bubble */
  .msg.agent .bubble strong{font-weight:700}
  .msg.agent .bubble p{margin-bottom:6px}
  .msg.agent .bubble p:last-child{margin-bottom:0}
  .msg.agent .bubble ul,.msg.agent .bubble ol{padding-inline-start:18px;margin-bottom:6px}
  .msg.agent .bubble li{margin-bottom:3px}
  .msg.agent .bubble a{color:#1D4ED8;text-decoration:underline;word-break:break-all}
  .msg.agent .bubble a:hover{color:#1e40af}

  /* empty state */
  .empty{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:10px;color:var(--ink-dim);text-align:center;
    padding:40px 20px;pointer-events:none;
  }
  .empty svg{opacity:.3}
  .empty p{font-size:14px}
</style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="barq-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M13 2 4.5 13H11l-1 9 8.5-11H12l1-9Z"/></svg>
    </div>
    <div class="topbar-text">
      <h1>برق · عروضك</h1>
      <p>اسألني عن أي تاجر</p>
    </div>
    <div class="status-dot" id="statusDot"></div>
    <button class="reset-btn" onclick="resetChat()" title="محادثة جديدة" aria-label="محادثة جديدة">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
  </div>

  <!-- Chat messages -->
  <div class="chat-area" id="chatArea">
    <div class="empty" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M13 2 4.5 13H11l-1 9 8.5-11H12l1-9Z"/></svg>
      <p>اكتب اسم تاجر أو اسأل عن عرض</p>
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="msgInput" rows="1" placeholder="عروض بـــرق"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="إرسال">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7Z"/></svg>
    </button>
  </div>

<script>
  const chatArea   = document.getElementById('chatArea');
  const msgInput   = document.getElementById('msgInput');
  const sendBtn    = document.getElementById('sendBtn');
  const statusDot  = document.getElementById('statusDot');
  const emptyState = document.getElementById('emptyState');

  let audioCtx = null;
  let typingEl = null;

  const CAT_COLORS = {
    'الطعام والشراب':'#0F7A52','التسوق':'#1D4ED8',
    'الصحة والجمال':'#047857','الأثاث المنزلي':'#92400E',
    'الترفيه':'#7C3AED','الرياضة':'#0369A1',
    'السفر والسياحة':'#B45309','السيارات':'#374151',
  };
  function catColor(cat){ return CAT_COLORS[cat] || '#555' }

  /* ── WebSocket ─────────────────────────────────────── */
  const WS_URL = `ws://${location.host}/ws`;
  let ws = null;

  function connectWS() {
    ws = new WebSocket(WS_URL);
    ws.onopen  = () => { statusDot.classList.add('connected'); sendBtn.disabled = false; };
    ws.onclose = () => { statusDot.classList.remove('connected'); sendBtn.disabled = true; setTimeout(connectWS, 2000); };
    ws.onerror = e => console.error('WS', e);
    ws.onmessage = e => { if (typeof e.data === 'string') handle(JSON.parse(e.data)); };
  }

  function handle(msg) {
    switch (msg.type) {
      case 'agent_reply':
        removeTyping();
        addBubble('agent', msg.text);
        break;
      case 'offer_card':
        removeTyping();
        addOfferCard(msg.offer);
        break;
      case 'similar_offers':
        removeTyping();
        addSimilarOffers(msg.offers);
        break;
      case 'audio_chunk':
        playWav(msg.data);
        break;
      case 'status':
        if (msg.label && msg.label.includes('أفكر') && !typingEl) showTyping();
        if (!msg.label) removeTyping();
        break;
      case 'error':
        removeTyping();
        addBubble('agent', 'حدث خطأ، حاول مرة ثانية.');
        break;
    }
  }

  /* ── Send message ──────────────────────────────────── */
  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    hideEmpty();
    addBubble('user', text);
    msgInput.value = '';
    msgInput.style.height = 'auto';
    showTyping();
    ws.send(JSON.stringify({ type: 'text_input', text }));
  }

  /* ── Reset ─────────────────────────────────────────── */
  function resetChat() {
    chatArea.innerHTML = '';
    chatArea.appendChild(emptyState);
    emptyState.style.display = 'flex';
    typingEl = null;
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'reset' }));
  }

  /* ── Bubble helpers ────────────────────────────────── */
  function hideEmpty(){ emptyState.style.display = 'none' }

  function now(){
    return new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
  }

  function addBubble(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const content = role === 'agent'
      ? marked.parse(text, { breaks: true })
      : escHtml(text);
    wrap.innerHTML = `<div class="bubble">${content}</div><div class="msg-time">${now()}</div>`;
    chatArea.appendChild(wrap);
    scrollBottom();
  }

  function addOfferCard(offer) {
    const color  = catColor(offer.category);
    const letter = (offer.merchant || '?')[0];
    const disc   = offer.discount_value || 'خصم خاص';
    const metas  = [
      offer.valid_to   ? `<span>📅 صالح حتى ${escHtml(offer.valid_to)}</span>`   : '',
      offer.channel    ? `<span>📍 ${escHtml(offer.channel)}</span>`             : '',
      offer.min_spend && offer.min_spend !== 'لا يوجد'
                       ? `<span>💳 الحد الأدنى ${escHtml(offer.min_spend)}</span>` : '',
    ].filter(Boolean).join('');

    const card = document.createElement('div');
    card.className = 'offer-card';
    card.innerHTML = `
      <div class="oc-head">
        <div class="oc-logo" style="background:radial-gradient(circle at 30% 25%,#ffffff55,${color})">${escHtml(letter)}</div>
        <div><div class="oc-name">${escHtml(offer.merchant)}</div><div class="oc-cat">${escHtml(offer.category||'')}</div></div>
      </div>
      <div class="oc-deal">
        <div class="oc-pct">${escHtml(disc)}</div>
        <div class="oc-lbl">${escHtml(offer.headline || 'خصم عبر برق فيزا')}</div>
      </div>
      ${metas ? `<div class="oc-meta">${metas}</div>` : ''}`;
    const wrap = document.createElement('div');
    wrap.className = 'msg agent';
    wrap.appendChild(card);
    wrap.appendChild(Object.assign(document.createElement('div'),{className:'msg-time',textContent:now()}));
    chatArea.appendChild(wrap);
    scrollBottom();
  }

  function addSimilarOffers(offers) {
    const list = document.createElement('div');
    list.className = 'similar-list';
    offers.forEach(o => {
      const color = catColor(o.category);
      const item  = document.createElement('div');
      item.className = 'sim-item';
      item.innerHTML = `
        <div class="sim-logo" style="background:radial-gradient(circle at 30% 25%,#ffffff55,${color})">${escHtml((o.merchant||'?')[0])}</div>
        <div class="sim-info"><b>${escHtml(o.merchant)}</b><span>${escHtml(o.category||'')}</span></div>
        <div class="sim-pct">${escHtml(o.discount_value||'—')}</div>`;
      list.appendChild(item);
    });
    const cat = offers[0]?.category || '';
    const wrap = document.createElement('div');
    wrap.className = 'msg agent';
    const title = Object.assign(document.createElement('div'),{
      className:'bubble',
      style:'margin-bottom:4px',
      textContent:`عروض مشابهة في «${cat}»`
    });
    wrap.appendChild(title);
    wrap.appendChild(list);
    wrap.appendChild(Object.assign(document.createElement('div'),{className:'msg-time',textContent:now()}));
    chatArea.appendChild(wrap);
    scrollBottom();
  }

  function showTyping() {
    if (typingEl) return;
    typingEl = document.createElement('div');
    typingEl.className = 'msg agent typing';
    typingEl.innerHTML = '<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
    chatArea.appendChild(typingEl);
    scrollBottom();
  }

  function removeTyping() {
    if (typingEl) { typingEl.remove(); typingEl = null; }
  }

  function scrollBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Audio playback ────────────────────────────────── */
  function playWav(b64) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const bytes = atob(b64);
    const buf   = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) buf[i] = bytes.charCodeAt(i);
    audioCtx.decodeAudioData(buf.buffer.slice(0), decoded => {
      const src = audioCtx.createBufferSource();
      src.buffer = decoded;
      src.connect(audioCtx.destination);
      src.start(0);
    });
  }

  /* ── Textarea auto-resize + Enter to send ──────────── */
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  /* ── marked config ─────────────────────────────────── */
  marked.use({
    renderer: (() => {
      const r = new marked.Renderer();
      r.link = (href, title, text) =>
        `<a href="${href}" target="_blank" rel="noopener noreferrer"${title ? ` title="${title}"` : ''}>${text}</a>`;
      return r;
    })()
  });

  /* ── Init ──────────────────────────────────────────── */
  sendBtn.disabled = true;
  connectWS();
</script>
</body>
</html>
